<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>松果AI - 情绪解压伙伴</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:var(--cream);color:#2D3436;line-height:1.5;min-height:100%;
  overflow:hidden;position:fixed;width:100%;height:100%;
}
:root{
  --green:#2D5F3E;--green-light:#4A8C62;--green-pale:#E8F0E8;
  --gold:#D4A843;--gold-light:#E8C96A;--gold-pale:#FFF8E8;
  --cream:#FAF7F0;--cream-dark:#F0EBE0;
  --brown:#8B6F47;--brown-light:#A68B5B;
  --orange:#E8944A;--orange-light:#F0A85C;
  --red-soft:#D4726A;--blue-soft:#6A9FB5;--purple-soft:#9B7EB5;
  --shadow:0 2px 12px rgba(45,95,62,0.06);
  --shadow-lg:0 8px 24px rgba(45,95,62,0.10);
  --radius:16px;--radius-sm:10px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,textarea{font-family:inherit;border:none;outline:none;background:none}

/* ===== App Shell ===== */
#app{display:flex;flex-direction:column;height:100%;width:100%;position:relative}

/* ===== Tab Content ===== */
.tab-content{display:none;flex:1;flex-direction:column;overflow:hidden;position:relative}
.tab-content.active{display:flex}

/* ===== Chat Tab ===== */
#chat-tab{background:var(--gold-pale)}
.chat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(12px + var(--safe-top)) 16px 12px;
  background:rgba(250,247,240,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(212,168,67,0.12);z-index:10;
  flex-shrink:0;
}
.chat-header-left{display:flex;align-items:center;gap:10px}
.chat-header-avatar{
  width:44px;height:44px;border-radius:50%;background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;color:#fff;box-shadow:0 2px 8px rgba(212,168,67,0.3);
}
.chat-header-info h3{font-size:15px;font-weight:600;color:var(--brown)}
.chat-header-info span{font-size:11px;color:#999}
.chat-header-btn{
  width:32px;height:32px;border-radius:50%;background:var(--gold-pale);
  display:flex;align-items:center;justify-content:center;font-size:16px;
}

/* Chat Messages */
.chat-messages{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px;padding-bottom:8px;
  display:flex;flex-direction:column;gap:12px;
}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--green);border-radius:2px}

.msg-row{display:flex;gap:8px;max-width:85%;animation:msgIn .3s ease}
.msg-row.bot{align-self:flex-start}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:24px;
  margin-top:2px;
}
.msg-row.bot .msg-avatar{background:var(--gold);color:#fff;box-shadow:0 2px 6px rgba(212,168,67,0.25)}
.msg-row.user .msg-avatar{background:var(--orange);color:#fff}
.msg-bubble{
  padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.6;
  word-break:break-word;position:relative;
}
.msg-row.bot .msg-bubble{background:#fff;border-top-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.msg-row.user .msg-bubble{background:var(--gold);color:#fff;border-top-right-radius:4px}
.msg-time{font-size:10px;color:#bbb;margin-top:4px;text-align:right}
.msg-row.bot .msg-time{text-align:left}

@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Typing Indicator */
.typing-indicator{display:flex;gap:4px;padding:12px 16px}
.typing-dot{
  width:6px;height:6px;border-radius:50%;background:var(--gold-light);
  animation:typingBounce 1.2s infinite;
}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* Scene Quick Access */
.scene-quick{
  flex-shrink:0;padding:8px 12px;background:rgba(250,247,240,0.95);
  border-top:1px solid rgba(212,168,67,0.10);
  overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;
  display:flex;gap:8px;
}
.scene-quick::-webkit-scrollbar{display:none}
.scene-quick-item{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:20px;background:#fff;
  font-size:13px;color:var(--brown);white-space:nowrap;
  border:1px solid var(--green-pale);transition:all .2s;
  flex-shrink:0;
}
.scene-quick-item:active{transform:scale(.95);background:var(--gold-pale)}
.scene-quick-item .sq-emoji{font-size:16px}

/* Chat Input */
.chat-input-area{
  flex-shrink:0;display:flex;align-items:flex-end;gap:8px;
  padding:10px 12px calc(10px + var(--safe-bottom));
  background:rgba(250,247,240,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(212,168,67,0.10);
  border-top:1px solid rgba(45,95,62,0.08);
}
.chat-input{
  flex:1;min-height:36px;max-height:100px;padding:8px 14px;
  border-radius:20px;background:#fff;font-size:15px;
  border:1px solid var(--cream-dark);resize:none;
  line-height:1.4;
}
.chat-input:focus{border-color:var(--gold)}
.chat-input::placeholder{color:#bbb}
.chat-send-btn{
  width:36px;height:36px;border-radius:50%;background:var(--gold);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;transition:all .2s;
}
.chat-send-btn:active{transform:scale(.9)}
.chat-send-btn.disabled{background:var(--cream-dark);color:#bbb}

/* ===== Records Tab ===== */
#records-tab{background:var(--cream)}
.records-header{
  padding:calc(20px + var(--safe-top)) 20px 16px;text-align:center;
  background:linear-gradient(180deg,var(--gold-pale) 0%,var(--cream) 100%);
  flex-shrink:0;
}
.records-header h2{font-size:20px;font-weight:700;color:var(--brown);margin-bottom:4px}
.records-header p{font-size:13px;color:#888}
.records-list{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 16px 20px;
}
.record-card{
  background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;
  border:1px solid rgba(212,168,67,0.10);
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
.record-card-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;
}
.record-card-scene{display:flex;align-items:center;gap:8px}
.record-card-scene-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  background:linear-gradient(135deg,#FFF8E8,#FFE8B0);
}
.record-card-scene-name{font-size:15px;font-weight:600;color:var(--brown)}
.record-card-date{font-size:12px;color:#999}
.record-card-dimensions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.record-dim{
  font-size:11px;padding:3px 8px;border-radius:10px;
  background:rgba(212,168,67,0.1);color:#B8860B;
}
.record-card-gains{
  font-size:13px;color:#666;line-height:1.6;
  padding-top:12px;border-top:1px solid #f0ebe0;
}
.record-card-gains strong{color:var(--brown);font-weight:600}
.record-card-action{
  margin-top:8px;font-size:12px;color:#B8860B;
  background:rgba(212,168,67,0.08);padding:8px 12px;border-radius:8px;
}
.record-empty{text-align:center;padding:60px 20px;color:#999}
.record-empty-icon{font-size:48px;margin-bottom:12px}
.record-empty p{font-size:14px;margin:0}

/* Scene Detail Modal */
.scene-modal{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.5);z-index:100;
  align-items:flex-end;justify-content:center;
}
.scene-modal.show{display:flex}
.scene-modal-content{
  background:var(--cream);border-radius:20px 20px 0 0;width:100%;max-height:80vh;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.scene-modal-header{
  padding:16px;border-bottom:1px solid var(--cream-dark);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--cream);z-index:10;
}
.scene-modal-header h3{font-size:16px;color:var(--brown)}
.scene-modal-close{font-size:20px;color:#999;padding:4px}
.scene-modal-body{padding:16px}
.scene-info-card{
  background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:16px;
  border:1px solid rgba(212,168,67,0.10);
}
.scene-info-emoji{font-size:48px;text-align:center;margin-bottom:12px}
.scene-info-name{font-size:18px;font-weight:700;color:var(--brown);text-align:center;margin-bottom:8px}
.scene-info-desc{font-size:14px;color:#666;text-align:center;line-height:1.6}
.scene-start-btn{
  width:100%;padding:14px;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:#fff;font-size:16px;font-weight:600;
  box-shadow:0 4px 12px rgba(212,168,67,0.3);
  transition:all .2s;
}
.scene-start-btn:active{transform:scale(.98)}

/* ===== Scenes Tab ===== */
#scenes-tab{background:var(--cream)}
.scenes-header{
  padding:calc(20px + var(--safe-top)) 20px 16px;text-align:center;
  background:linear-gradient(180deg,var(--green-pale) 0%,var(--cream) 100%);
  flex-shrink:0;
}
.scenes-header h2{font-size:20px;font-weight:700;color:var(--green);margin-bottom:4px}
.scenes-header p{font-size:13px;color:#888}
.scenes-grid{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 16px 20px;
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  align-content:start;
}
.scene-card{
  background:#fff;border-radius:var(--radius);padding:16px;
  border:1px solid rgba(45,95,62,0.08);
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
  cursor:pointer;transition:all .2s;
}
.scene-card:active{transform:scale(.97);border-color:var(--green)}
.scene-card-emoji{font-size:32px;margin-bottom:8px}
.scene-card-name{font-size:15px;font-weight:600;color:var(--green);margin-bottom:4px}
.scene-card-desc{font-size:12px;color:#888;line-height:1.4}

/* ===== My Tab ===== */
#my-tab{background:var(--cream)}
.my-header{
  padding:calc(20px + var(--safe-top)) 20px 16px;text-align:center;
  background:linear-gradient(180deg,var(--green-pale) 0%,var(--cream) 100%);
  flex-shrink:0;
}
.my-header h2{font-size:20px;font-weight:700;color:var(--green);margin-bottom:4px}
.my-header p{font-size:13px;color:#888}
.my-content{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 16px 20px;
}
.my-profile-card{
  background:#fff;border-radius:var(--radius);padding:20px;
  display:flex;align-items:center;gap:16px;margin-bottom:16px;
  border:1px solid rgba(45,95,62,0.08);
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
.my-avatar{
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  display:flex;align-items:center;justify-content:center;
  font-size:36px;color:#fff;box-shadow:0 4px 12px rgba(212,168,67,0.3);
}
.my-info{flex:1}
.my-info h3{font-size:16px;font-weight:600;color:var(--brown);margin-bottom:4px}
.my-info p{font-size:12px;color:#888}
.my-stats{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;
}
.stat-card{
  background:#fff;border-radius:var(--radius-sm);padding:16px;
  text-align:center;border:1px solid rgba(45,95,62,0.08);
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
.stat-value{font-size:24px;font-weight:700;color:var(--green);margin-bottom:4px}
.stat-label{font-size:12px;color:#888}
.my-dimensions{
  background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:16px;
  border:1px solid rgba(45,95,62,0.08);
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
.my-dimensions h3{font-size:15px;font-weight:600;color:var(--brown);margin-bottom:12px}
.dimension-bar{margin-bottom:12px}
.dimension-bar:last-child{margin-bottom:0}
.dimension-bar-header{display:flex;justify-content:space-between;margin-bottom:6px}
.dimension-bar-name{font-size:13px;color:#666}
.dimension-bar-value{font-size:13px;font-weight:600;color:var(--green)}
.dimension-bar-track{height:8px;background:var(--cream-dark);border-radius:4px;overflow:hidden}
.dimension-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.my-menu{
  background:#fff;border-radius:var(--radius);
  border:1px solid rgba(45,95,62,0.08);
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
  overflow:hidden;
}
.my-menu-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-bottom:1px solid var(--cream-dark);
  cursor:pointer;transition:background .2s;
}
.my-menu-item:last-child{border-bottom:none}
.my-menu-item:active{background:var(--cream-dark)}
.my-menu-icon{font-size:20px}
.my-menu-text{flex:1;font-size:14px;color:var(--brown)}
.my-menu-arrow{color:#ccc;font-size:18px}

/* ===== Tab Bar ===== */
.tab-bar{
  display:flex;justify-content:space-around;
  padding:8px 0 calc(8px + var(--safe-bottom));
  background:rgba(250,247,240,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(45,95,62,0.08);flex-shrink:0;
}
.tab-bar-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 12px;border-radius:8px;cursor:pointer;
  transition:all .2s;
}
.tab-bar-item:active{transform:scale(.95)}
.tab-bar-item.active .tab-bar-icon{color:var(--gold)}
.tab-bar-item.active .tab-bar-label{color:var(--gold);font-weight:600}
.tab-bar-icon{font-size:22px;color:#999}
.tab-bar-label{font-size:10px;color:#999}

/* ===== Animations ===== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-in{animation:fadeIn .3s ease}
</style>
</head>
<body>
<div id="app">
  <!-- Chat Tab -->
  <div id="chat-tab" class="tab-content active">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-header-avatar">🐿</div>
        <div class="chat-header-info">
          <h3 id="chat-role-name">松果</h3>
          <span id="chat-role-status">在线 · 你的解压伙伴</span>
        </div>
      </div>
      <button class="chat-header-btn" onclick="resetChat()">↻</button>
    </div>
    
    <div class="chat-messages" id="chat-messages">
      <div class="msg-row bot">
        <div class="msg-avatar">🐿</div>
        <div class="msg-bubble">
          嘿，你来啦~ 我是松果，你的解压小伙伴。<br><br>
          今天过得怎么样？有什么想聊的，或者想玩个解压小游戏？<br>
          随便说，我都在~
        </div>
      </div>
    </div>
    
    <div class="scene-quick" id="scene-quick"></div>
    
    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="说点什么..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
      <button class="chat-send-btn" id="chat-send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
  
  <!-- Scenes Tab -->
  <div id="scenes-tab" class="tab-content">
    <div class="scenes-header">
      <h2>解压场景</h2>
      <p>选择适合你的解压方式</p>
    </div>
    <div class="scenes-grid" id="scenes-grid"></div>
  </div>
  
  <!-- Records Tab -->
  <div id="records-tab" class="tab-content">
    <div class="records-header">
      <h2>解压记录</h2>
      <p>回顾你的解压历程</p>
    </div>
    <div class="records-list" id="records-list"></div>
  </div>
  
  <!-- My Tab -->
  <div id="my-tab" class="tab-content">
    <div class="my-header">
      <h2>我的</h2>
      <p>查看你的解压数据</p>
    </div>
    <div class="my-content">
      <div class="my-profile-card">
        <div class="my-avatar">🐿</div>
        <div class="my-info">
          <h3>松果用户</h3>
          <p>已解压 <span id="my-session-count">0</span> 次</p>
        </div>
      </div>
      <div class="my-stats">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">总对话</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-scenes">0</div>
          <div class="stat-label">场景数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-days">0</div>
          <div class="stat-label">连续天数</div>
        </div>
      </div>
      <div class="my-dimensions">
        <h3>五维解压指数</h3>
        <div id="dimensions-container"></div>
      </div>
      <div class="my-menu">
        <div class="my-menu-item" onclick="exportData()">
          <span class="my-menu-icon">📤</span>
          <span class="my-menu-text">导出数据</span>
          <span class="my-menu-arrow">›</span>
        </div>
        <div class="my-menu-item" onclick="clearAllData()">
          <span class="my-menu-icon">🗑</span>
          <span class="my-menu-text">清空记录</span>
          <span class="my-menu-arrow">›</span>
        </div>
        <div class="my-menu-item">
          <span class="my-menu-icon">⚙</span>
          <span class="my-menu-text">设置</span>
          <span class="my-menu-arrow">›</span>
        </div>
        <div class="my-menu-item">
          <span class="my-menu-icon"></span>
          <span class="my-menu-text">帮助与反馈</span>
          <span class="my-menu-arrow">›</span>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-bar-item active" onclick="switchTab('chat')">
      <span class="tab-bar-icon">💬</span>
      <span class="tab-bar-label">聊天</span>
    </div>
    <div class="tab-bar-item" onclick="switchTab('records')">
      <span class="tab-bar-icon"></span>
      <span class="tab-bar-label">记录</span>
    </div>
    <div class="tab-bar-item" onclick="switchTab('my')">
      <span class="tab-bar-icon"></span>
      <span class="tab-bar-label">我的</span>
    </div>
  </div>
</div>

<script>
// ===== Data =====
const scenes = [
  {id:'roast',name:'最佳损友',emoji:'🔥',desc:'站队护短、一起吐槽',opening:'来，今天谁惹你了？我当树洞，随便骂，我帮你记仇。'},
  {id:'heal',name:'治愈倾听者',emoji:'🌿',desc:'温柔不评判的倾听',opening:'今天过得还好吗？想说点什么都可以，我都在。'},
  {id:'argue',name:'吵架对手',emoji:'⚔',desc:'演那个让你不爽的人',opening:'说吧，今天演谁？甲方？领导？还是谁惹你了？我接火但不真伤人。'},
  {id:'treehole',name:'树洞',emoji:'',desc:'无评判的容纳容器',opening:'这里是树洞，说什么都可以，说完就删。来吧，我接着。'},
  {id:'emotion',name:'情绪向导',emoji:'🧭',desc:'苏格拉底式提问',opening:'刚才那件事，最让你在意的是哪一句/哪个瞬间？咱们一起看看。'},
  {id:'breathe',name:'呼吸引导员',emoji:'🌬',desc:'松果呼吸泡泡意象放松',opening:'来，找个舒服的姿势。跟着松果的呼吸泡泡：吸——停——呼——'}
];

const dimensionData = [

let currentRole = '松果';
let messageCount = 0;

// ===== Tab Switching =====
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-bar-item').forEach(el => el.classList.remove('active'));
  document.getElementById(tab + '-tab').classList.add('active');
  document.querySelectorAll('.tab-bar-item')[['chat','records','my'].indexOf(tab)].classList.add('active');
  if(tab === 'my') setTimeout(animateDimensions, 300);
  if(tab === 'records') renderRecords();
}

// ===== Chat Functions =====
function addMessage(text, isUser) {
  const container = document.getElementById('chat-messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isUser ? 'user' : 'bot');
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = isUser ? '🧑' : (currentRole === '松果' ? '🐿' : scenes.find(s => s.name === currentRole)?.emoji || '🐿');
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  row.appendChild(avatar);
  row.appendChild(bubble);
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chat-messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-row';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = currentRole === '松果' ? '🐿' : (scenes.find(s => s.name === currentRole)?.emoji || '');
  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  row.appendChild(avatar);
  row.appendChild(indicator);
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-row');
  if(el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  addMessage(text, true);
  input.value = '';
  input.style.height = 'auto';
  messageCount++;
  showTyping();
  
  try {
    const response = await fetch(API_URL + '/api/chat', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Date': new Date().toUTCString()
      },
      body: JSON.stringify({
        message: text,
        session_id: sessionId || 'session_' + Date.now(),
        role: currentRole
      })
    });
    
    const data = await response.json();
    removeTyping();
    sessionId = data.session_id;
    addMessage(data.reply, false);
  } catch (error) {
    removeTyping();
    // Fallback to local replies if API fails
    const replies = roleReplies[currentRole] || roleReplies['松果'];
    const reply = replies[Math.floor(Math.random() * replies.length)];
    addMessage(reply, false);
  }
}

function handleKeyDown(e) {
  if(e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function selectScene(sceneId) {
  const scene = scenes.find(s => s.id === sceneId);
  if(!scene) return;
  currentRole = scene.name;
  sessionId = null; // Reset session when switching roles
  document.getElementById('chat-role-name').textContent = scene.name;
  document.getElementById('chat-role-status').textContent = scene.desc;
  switchTab('chat');
  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      removeTyping();
      addMessage(scene.opening, false);
    }, 600);
  }, 300);
}

async function resetChat() {
  currentRole = '松果';
  messageCount = 0;
  sessionId = null;
  document.getElementById('chat-role-name').textContent = '松果';
  document.getElementById('chat-role-status').textContent = '在线 · 你的解压伙伴';
  const container = document.getElementById('chat-messages');
  container.innerHTML = '';
  
  // Call backend to reset session
  try {
    await fetch(API_URL + '/api/switch-role', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId || 'session_' + Date.now(), target_role: '松果' })
    });
  } catch (e) {}
  
  addMessage('嘿，你又来啦~ 今天想聊点什么？', false);
}

// ===== Render Functions =====
function renderScenes() {
  const grid = document.getElementById('scenes-grid');
  grid.innerHTML = scenes.map(s => `
    <div class="scene-card" onclick="selectScene('${s.id}')">
      <div class="scene-card-emoji">${s.emoji}</div>
      <div class="scene-card-name">${s.name}</div>
      <div class="scene-card-desc">${s.desc}</div>
    </div>
  `).join('');
}

function renderSceneQuick() {
  const container = document.getElementById('scene-quick');
  container.innerHTML = scenes.map(s => `
    <div class="scene-quick-item" onclick="selectScene('${s.id}')">
      <span class="sq-emoji">${s.emoji}</span>
      <span>${s.name}</span>
    </div>
  `).join('');
}

function renderRecords() {
  const list = document.getElementById('records-list');
  const records = JSON.parse(localStorage.getItem('songguo_records') || '[]');
  
  if(records.length === 0) {
    list.innerHTML = `
      <div class="record-empty">
        <div class="record-empty-icon"></div>
        <p>还没有解压记录<br>去聊天页开始你的第一次解压吧~</p>
      </div>
    `;
    return;
  }
  
  list.innerHTML = records.slice().reverse().map(r => `
    <div class="record-card">
      <div class="record-card-header">
        <div class="record-card-scene">
          <div class="record-card-scene-icon">${scenes.find(s => s.name === r.role)?.emoji || '🐿'}</div>
          <div class="record-card-scene-name">${r.role || '松果'}</div>
        </div>
        <div class="record-card-date">${r.date || '刚刚'}</div>
      </div>
      ${r.dimensions ? `<div class="record-card-dimensions">${r.dimensions.map(d => `<span class="record-dim">${d.name}: ${d.value}</span>`).join('')}</div>` : ''}
      <div class="record-card-gains"><strong>今日收获：</strong>${r.summary || '暂无摘要'}</div>
      ${r.action ? `<div class="record-card-action">📌 下一步：${r.action}</div>` : ''}
    </div>
  `).join('');
}

function animateDimensions() {
  const container = document.getElementById('dimensions-container');
  container.innerHTML = dimensionData.map((d, i) => `
    <div class="dimension-bar">
      <div class="dimension-bar-header">
        <span class="dimension-bar-name">${d.name}</span>
        <span class="dimension-bar-value">${d.value}%</span>
      </div>
      <div class="dimension-bar-track">
        <div class="dimension-bar-fill" style="width:0%;background:var(--green)"></div>
      </div>
    </div>
  `).join('');
  
  setTimeout(() => {
    dimensionData.forEach((d, i) => {
      const fill = container.querySelectorAll('.dimension-bar-fill')[i];
      if(fill) fill.style.width = d.value + '%';
    });
  }, 100);
}

// ===== Data Functions =====
function exportData() {
  const records = localStorage.getItem('songguo_records') || '[]';
  const blob = new Blob([records], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'songguo_records_' + Date.now() + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function clearAllData() {
  if(confirm('确定要清空所有记录吗？此操作不可恢复。')) {
    localStorage.removeItem('songguo_records');
    alert('已清空所有记录');
    renderRecords();
  }
}
