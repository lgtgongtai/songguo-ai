<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>松果AI - 情绪解压伙伴</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:var(--cream);color:#2D3436;line-height:1.5;min-height:100%;
  overflow:hidden;position:fixed;width:100%;height:100%;
}
:root{
  --green:#2D5F3E;--green-light:#4A8C62;--green-pale:#E8F0E8;
  --gold:#D4A843;--gold-light:#E8C96A;--gold-pale:#FFF8E8;
  --cream:#FAF7F0;--cream-dark:#F0EBE0;
  --brown:#8B6F47;--brown-light:#A68B5B;
  --orange:#E8944A;--orange-light:#F0A85C;
  --red-soft:#D4726A;--blue-soft:#6A9FB5;--purple-soft:#9B7EB5;
  --shadow:0 2px 12px rgba(45,95,62,0.06);
  --shadow-lg:0 8px 24px rgba(45,95,62,0.10);
  --radius:16px;--radius-sm:10px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,textarea{font-family:inherit;border:none;outline:none;background:none}

/* ===== App Shell ===== */
#app{display:flex;flex-direction:column;height:100%;width:100%;position:relative}

/* ===== Tab Content ===== */
.tab-content{display:none;flex:1;flex-direction:column;overflow:hidden;position:relative}
.tab-content.active{display:flex}

/* ===== Chat Tab ===== */
#chat-tab{background:var(--gold-pale)}
.chat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(12px + var(--safe-top)) 16px 12px;
  background:rgba(250,247,240,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(212,168,67,0.12);z-index:10;
  flex-shrink:0;
}
.chat-header-left{display:flex;align-items:center;gap:10px}
.chat-header-avatar{
  width:44px;height:44px;border-radius:50%;background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;color:#fff;box-shadow:0 2px 8px rgba(212,168,67,0.3);
}
.chat-header-info h3{font-size:15px;font-weight:600;color:var(--brown)}
.chat-header-info span{font-size:11px;color:#999}
.chat-header-btn{
  width:32px;height:32px;border-radius:50%;background:var(--gold-pale);
  display:flex;align-items:center;justify-content:center;font-size:16px;
}

/* Chat Messages */
.chat-messages{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px;padding-bottom:8px;
  display:flex;flex-direction:column;gap:12px;
}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--green);border-radius:2px}

.msg-row{display:flex;gap:8px;max-width:85%;animation:msgIn .3s ease}
.msg-row.bot{align-self:flex-start}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:24px;
  margin-top:2px;
}
.msg-row.bot .msg-avatar{background:var(--gold);color:#fff;box-shadow:0 2px 6px rgba(212,168,67,0.25)}
.msg-row.user .msg-avatar{background:var(--orange);color:#fff}
.msg-bubble{
  padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.6;
  word-break:break-word;position:relative;
}
.msg-row.bot .msg-bubble{background:#fff;border-top-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.msg-row.user .msg-bubble{background:var(--gold);color:#fff;border-top-right-radius:4px}
.msg-time{font-size:10px;color:#bbb;margin-top:4px;text-align:right}
.msg-row.bot .msg-time{text-align:left}

@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Typing Indicator */
.typing-indicator{display:flex;gap:4px;padding:12px 16px}
.typing-dot{
  width:6px;height:6px;border-radius:50%;background:var(--gold-light);
  animation:typingBounce 1.2s infinite;
}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* Scene Quick Access */
.scene-quick{
  flex-shrink:0;padding:8px 12px;background:rgba(250,247,240,0.95);
  border-top:1px solid rgba(212,168,67,0.10);
  overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;
  display:flex;gap:8px;
}
.scene-quick::-webkit-scrollbar{display:none}
.scene-quick-item{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:20px;background:#fff;
  font-size:13px;color:var(--brown);white-space:nowrap;
  border:1px solid var(--green-pale);transition:all .2s;
  flex-shrink:0;
}
.scene-quick-item:active{transform:scale(.95);background:var(--gold-pale)}
.scene-quick-item .sq-emoji{font-size:16px}

/* Chat Input */
.chat-input-area{
  flex-shrink:0;display:flex;align-items:flex-end;gap:8px;
  padding:10px 12px calc(10px + var(--safe-bottom));
  background:rgba(250,247,240,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(212,168,67,0.10);
  border-top:1px solid rgba(45,95,62,0.08);
}
.chat-input{
  flex:1;min-height:36px;max-height:100px;padding:8px 14px;
  border-radius:20px;background:#fff;font-size:15px;
  border:1px solid var(--cream-dark);resize:none;
  line-height:1.4;
}
.chat-input:focus{border-color:var(--gold)}
.chat-input::placeholder{color:#bbb}
.chat-send-btn{
  width:36px;height:36px;border-radius:50%;background:var(--gold);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;transition:all .2s;
}
.chat-send-btn:active{transform:scale(.9)}
.chat-send-btn.disabled{background:var(--cream-dark);color:#bbb}

/* ===== Records Tab ===== */
#records-tab{background:var(--cream)}
.records-header{
  padding:calc(20px + var(--safe-top)) 20px 16px;text-align:center;
  background:linear-gradient(180deg,var(--gold-pale) 0%,var(--cream) 100%);
  flex-shrink:0;
}
.records-header h2{font-size:20px;font-weight:700;color:var(--brown);margin-bottom:4px}
.records-header p{font-size:13px;color:#888}
.records-list{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 16px 20px;
}
.record-card{
  background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;
  border:1px solid rgba(212,168,67,0.10);
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
.record-card-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;
}
.record-card-scene{display:flex;align-items:center;gap:8px}
.record-card-scene-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  background:linear-gradient(135deg,#FFF8E8,#FFE8B0);
}
.record-card-scene-name{font-size:15px;font-weight:600;color:var(--brown)}
.record-card-date{font-size:12px;color:#999}
.record-card-dimensions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.record-dim{
  font-size:11px;padding:3px 8px;border-radius:10px;
  background:rgba(212,168,67,0.1);color:#B8860B;
}
.record-card-gains{
  font-size:13px;color:#666;line-height:1.6;
  padding-top:12px;border-top:1px solid #f0ebe0;
}
.record-card-gains strong{color:var(--brown);font-weight:600}
.record-card-action{
  margin-top:8px;font-size:12px;color:#B8860B;
  background:rgba(212,168,67,0.08);padding:8px 12px;border-radius:8px;
}
.record-empty{text-align:center;padding:60px 20px;color:#999}
.record-empty-icon{font-size:48px;margin-bottom:12px}
.record-empty p{font-size:14px;margin:0}

/* Scene Detail Modal */
.scene-modal{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.5);z-index:100;
  align-items:flex-end;justify-content:center;
}
.scene-modal.show{display:flex}
.scene-modal-content{
  background:var(--cream);border-radius:20px 20px 0 0;width:100%;max-height:80vh;
  padding:24px 20px calc(20px + var(--safe-bottom));overflow-y:auto;
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.scene-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.scene-modal-header h3{font-size:18px;font-weight:600;color:var(--brown)}
.scene-modal-close{width:28px;height:28px;border-radius:50%;background:var(--cream-dark);display:flex;align-items:center;justify-content:center;font-size:14px}
.scene-modal-body p{font-size:14px;color:#666;line-height:1.7;margin-bottom:12px}
.scene-modal-body .scene-meta{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.scene-modal-body .scene-meta span{font-size:12px;padding:4px 10px;border-radius:12px;background:var(--gold-pale);color:var(--brown)}
.scene-modal-start{
  width:100%;padding:14px;border-radius:var(--radius);background:var(--gold);
  color:#fff;font-size:15px;font-weight:600;margin-top:16px;
  transition:all .2s;box-shadow:0 4px 12px rgba(212,168,67,0.3);
}
.scene-modal-start:active{transform:scale(.97)}

/* ===== My Tab ===== */
#my-tab{background:var(--cream)}
.my-header{
  padding:calc(24px + var(--safe-top)) 20px 20px;text-align:center;
  background:linear-gradient(180deg,var(--gold-pale) 0%,var(--cream) 100%);
  flex-shrink:0;
}
.my-avatar{
  width:72px;height:72px;border-radius:50%;background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:48px;color:#fff;margin:0 auto 10px;
  box-shadow:0 4px 16px rgba(212,168,67,0.35);
}
.my-header h2{font-size:18px;font-weight:600;color:var(--brown);margin-bottom:2px}
.my-header p{font-size:12px;color:#999}
.my-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 20px}

.my-section{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.my-section-title{font-size:14px;font-weight:600;color:var(--brown);margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* Dimensions */
.dim-item{margin-bottom:10px}
.dim-item:last-child{margin-bottom:0}
.dim-item-header{display:flex;justify-content:space-between;margin-bottom:4px}
.dim-item-header span:first-child{font-size:13px;color:#555}
.dim-item-header span:last-child{font-size:13px;font-weight:600;color:var(--gold)}
.dim-bar{height:6px;background:var(--cream-dark);border-radius:3px;overflow:hidden}
.dim-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold-light),var(--gold));width:0;transition:width 1s ease}

/* Guide Steps */
.guide-steps{display:flex;flex-direction:column;gap:12px}
.guide-step{display:flex;gap:10px;align-items:flex-start}
.guide-step-num{
  width:24px;height:24px;border-radius:50%;background:var(--gold-pale);
  color:var(--gold);font-size:12px;font-weight:600;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.guide-step-text{font-size:13px;color:#666;line-height:1.5}
.guide-step-text strong{color:var(--brown);font-weight:600}

/* About */
.about-links{display:flex;flex-direction:column;gap:8px}
.about-link{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px;border-radius:var(--radius-sm);background:var(--gold-pale);
  font-size:14px;color:#555;
}
.about-link:active{background:var(--cream-dark)}
.about-link-arrow{color:#ccc}

/* ===== Bottom Tab Bar ===== */
.tab-bar{
  flex-shrink:0;display:flex;
  padding:6px 0 calc(6px + var(--safe-bottom));
  background:rgba(250,247,240,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(212,168,67,0.12);z-index:50;
}
.tab-bar-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 0;cursor:pointer;transition:all .2s;position:relative;
}
.tab-bar-item .tab-icon{font-size:22px;transition:all .2s}
.tab-bar-item .tab-label{font-size:10px;color:#999;transition:all .2s}
.tab-bar-item.active .tab-icon{transform:scale(1.1)}
.tab-bar-item.active .tab-label{color:var(--gold);font-weight:600}
.tab-bar-item.active::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:20px;height:2px;border-radius:1px;background:var(--gold);
}

/* ===== Desktop (>=768px) ===== */
@media(min-width:768px){
  #app{max-width:480px;margin:0 auto;border-left:1px solid var(--cream-dark);border-right:1px solid var(--cream-dark)}
  body{background:#E8DFD0}
}
@media(min-width:1024px){
  #app{max-width:420px;box-shadow:var(--shadow-lg)}
}

/* ===== Landscape ===== */
@media(max-height:500px) and (orientation:landscape){
  .chat-header{padding:8px 16px}
  .chat-messages{padding:8px 16px}
  .scene-quick{padding:4px 12px}
  .chat-input-area{padding:6px 12px}
}
</style>
</head>
<body>
<div id="app">

  <!-- ===== Chat Tab ===== -->
  <div id="chat-tab" class="tab-content active">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-header-avatar">🐿</div>
        <div class="chat-header-info">
          <h3 id="chat-role-name">松果</h3>
          <span id="chat-role-status">在线 · 你的解压伙伴</span>
        </div>
      </div>
      <button class="chat-header-btn" onclick="resetChat()" title="新对话">↻</button>
    </div>

    <div class="chat-messages" id="chat-messages">
      <div class="msg-row bot">
        <div class="msg-avatar">🐿</div>
        <div class="msg-bubble">
          嘿，你来啦~ 我是松果，你的解压小伙伴。<br><br>
          今天过得怎么样？有什么想聊的，或者想玩个解压小游戏？<br>
          随便说，我都在~
        </div>
      </div>
    </div>

    <div class="scene-quick" id="scene-quick">
      <button class="scene-quick-item" onclick="selectScene('吐槽大会')"><span class="sq-emoji">🔥</span>吐槽大会</button>
      <button class="scene-quick-item" onclick="selectScene('治愈聊天')"><span class="sq-emoji">🌿</span>治愈聊天</button>
      <button class="scene-quick-item" onclick="selectScene('吵架模拟器')"><span class="sq-emoji">💢</span>吵架模拟器</button>
      <button class="scene-quick-item" onclick="selectScene('安全宣泄')"><span class="sq-emoji">🕳</span>树洞</button>
      <button class="scene-quick-item" onclick="selectScene('复盘引导')"><span class="sq-emoji">🧭</span>复盘引导</button>
      <button class="scene-quick-item" onclick="selectScene('放松舱')"><span class="sq-emoji">🫧</span>放松舱</button>
    </div>

    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="说点什么..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
      <button class="chat-send-btn" id="chat-send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- ===== Records Tab ===== -->
  <div id="records-tab" class="tab-content">
    <div class="records-header">
      <h2>解压记录</h2>
      <p>每一次对话，都是一次松口气</p>
    </div>
    <div class="records-list" id="records-list"></div>
  </div>

  <!-- ===== My Tab ===== -->
  <div id="my-tab" class="tab-content">
    <div class="my-header">
      <div class="my-avatar">🐿</div>
      <h2>松果AI</h2>
      <p>松一口气，换一种活法</p>
    </div>
    <div class="my-content">
      <div class="my-section">
        <div class="my-section-title">📊 解压维度</div>
        <div id="dimensions"></div>
      </div>
      <div class="my-section">
        <div class="my-section-title">📖 怎么玩</div>
        <div class="guide-steps">
          <div class="guide-step">
            <div class="guide-step-num">1</div>
            <div class="guide-step-text"><strong>玩</strong> — 选一个场景，和松果聊起来</div>
          </div>
          <div class="guide-step">
            <div class="guide-step-num">2</div>
            <div class="guide-step-text"><strong>记</strong> — 聊完自动生成解压成效记录</div>
          </div>
          <div class="guide-step">
            <div class="guide-step-num">3</div>
            <div class="guide-step-text"><strong>评</strong> — 看见自己的情绪变化</div>
          </div>
          <div class="guide-step">
            <div class="guide-step-num">4</div>
            <div class="guide-step-text"><strong>复</strong> — 复玩，形成日常解压习惯</div>
          </div>
        </div>
      </div>
      <div class="my-section">
        <div class="my-section-title">关于</div>
        <div class="about-links">
          <div class="about-link">版本<span style="color:#999">v1.0.0</span></div>
          <div class="about-link">松果AI · 情绪解压伙伴</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Bottom Tab Bar ===== -->
  <div class="tab-bar">
    <div class="tab-bar-item active" onclick="switchTab('chat')">
      <span class="tab-icon">💬</span>
      <span class="tab-label">聊天</span>
    </div>
    <div class="tab-bar-item" onclick="switchTab('records')">
      <span class="tab-icon">📋</span>
      <span class="tab-label">记录</span>
    </div>
    <div class="tab-bar-item" onclick="switchTab('my')">
      <span class="tab-icon">🐿</span>
      <span class="tab-label">我的</span>
    </div>
  </div>

</div>

<!-- Scene Detail Modal -->
<div class="scene-modal" id="scene-modal">
  <div class="scene-modal-content">
    <div class="scene-modal-header">
      <h3 id="modal-title"></h3>
      <button class="scene-modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="scene-modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ===== Scene Data =====
const scenes = [
  {id:'吐槽大会',emoji:'🔥',name:'最佳损友',desc:'找个AI一起痛快吐槽',detail:'把堵着的那口气放出来。最佳损友永远站你这边，不劝和、不评判，陪你一起骂完再松口气。',tag:'免费',difficulty:'★★',rounds:'6-10轮',opening:'今天谁惹你了？我当树洞，随便骂，我帮你记仇。'},
  {id:'治愈聊天',emoji:'🌿',name:'治愈倾听者',desc:'温柔陪伴，被接住的感觉',detail:'一个温柔、安静、永远在的倾听者。不急着给答案，先把你接住。你说的话，我都听进去了。',tag:'会员',difficulty:'★★',rounds:'6-12轮',opening:'今天过得还好吗？想说点什么都可以，我都在。'},
  {id:'吵架模拟器',emoji:'💢',name:'吵架对手',desc:'把憋着的话甩出来',detail:'你指定那个让你不爽的人，我来演。语气带刺但不过线，专门当你的安全发火桶。吵完了，我主动和好。',tag:'会员',difficulty:'★★★',rounds:'6-12轮',opening:'行，你说说，你想跟我吵什么？'},

// ===== Tab Switching =====
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-bar-item').forEach(el => el.classList.remove('active'));
  document.getElementById(tab + '-tab').classList.add('active');
  document.querySelectorAll('.tab-bar-item')[['chat','records','my'].indexOf(tab)].classList.add('active');
  if(tab === 'my') setTimeout(animateDimensions, 300);
  if(tab === 'records') renderRecords();
}

// ===== Chat Functions =====
function addMessage(text, isUser) {
  const container = document.getElementById('chat-messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isUser ? 'user' : 'bot');
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = isUser ? '🧑' : (currentRole === '松果' ? '🐿' : scenes.find(s => s.name === currentRole)?.emoji || '🐿');
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  row.appendChild(avatar);
  row.appendChild(bubble);
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chat-messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-row';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = currentRole === '松果' ? '🐿' : (scenes.find(s => s.name === currentRole)?.emoji || '🐿');
  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  row.appendChild(avatar);
  row.appendChild(indicator);
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-row');
  if(el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  addMessage(text, true);
  input.value = '';
  input.style.height = 'auto';
  messageCount++;
  showTyping();
  
  try {
    const response = await fetch(API_URL + '/api/chat', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Date': new Date().toUTCString()
      },
      body: JSON.stringify({
        message: text,
        session_id: sessionId || 'session_' + Date.now(),
        role: currentRole
      })
    });
    
    const data = await response.json();
    removeTyping();
    sessionId = data.session_id;
    addMessage(data.reply, false);
  } catch (error) {
    removeTyping();
    // Fallback to local replies if API fails
    const replies = roleReplies[currentRole] || roleReplies['松果'];
    const reply = replies[Math.floor(Math.random() * replies.length)];
    addMessage(reply, false);
  }
}

function handleKeyDown(e) {
  if(e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function selectScene(sceneId) {
  const scene = scenes.find(s => s.id === sceneId);
  if(!scene) return;
  currentRole = scene.name;
  sessionId = null; // Reset session when switching roles
  document.getElementById('chat-role-name').textContent = scene.name;
  document.getElementById('chat-role-status').textContent = scene.desc;
  switchTab('chat');
  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      removeTyping();
      addMessage(scene.opening, false);
    }, 600);
  }, 300);
}

async function resetChat() {
  currentRole = '松果';
  messageCount = 0;
  sessionId = null;
  document.getElementById('chat-role-name').textContent = '松果';
  document.getElementById('chat-role-status').textContent = '在线 · 你的解压伙伴';
  const container = document.getElementById('chat-messages');
  container.innerHTML = '';
  
  // Call backend to reset session
  try {
    await fetch(API_URL + '/api/switch-role', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId || 'session_' + Date.now(), target_role: '松果' })
    });
  } catch (e) {}
  
  addMessage('嘿，你又来啦~ 今天想聊点什么？', false);
}

function renderScenes() {
  const grid = document.getElementById('scenes-grid');
  grid.innerHTML = '';
  scenes.forEach(s => {
    const card = document.createElement('div');
    card.className = 'scene-card';
    card.onclick = () => openSceneModal(s);
    card.innerHTML = `
      <span class="scene-card-tag ${s.tag === '免费' ? '' : 'paid'}">${s.tag}</span>
      <div class="scene-card-icon">${s.emoji}</div>
      <div class="scene-card-name">${s.id}</div>
      <div class="scene-card-desc">${s.desc}</div>
    `;
    grid.appendChild(card);
  });
}

function openSceneModal(scene) {
  document.getElementById('modal-title').textContent = scene.id;
  document.getElementById('modal-body').innerHTML = `
    <div class="scene-meta">
      <span>🎭 ${scene.name}</span>
      <span>难度 ${scene.difficulty}</span>
      <span>💬 ${scene.rounds}</span>
      <span>${scene.tag === '免费' ? '🆓 免费' : '💎 ' + scene.tag}</span>
    </div>
    <p>${scene.detail}</p>
    <p style="font-size:13px;color:var(--brown);background:var(--cream);padding:10px 14px;border-radius:10px;margin-top:8px">
      💬 开场白：「${scene.opening}」
    </p>
    <button class="scene-modal-start" onclick="startScene('${scene.id}')">开始对话</button>
  `;
  document.getElementById('scene-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('scene-modal').classList.remove('show');
}

function startScene(sceneId) {
  closeModal();
  selectScene(sceneId);
}

      <div class="dim-bar"><div class="dim-bar-fill" data-width="${d.value}"></div></div>

    container.appendChild(item);
  });

function animateDimensions() {
